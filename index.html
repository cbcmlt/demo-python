<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projekt Übersicht — Demo Python</title>
    <!--
      Demo-Plugin: echtes Python im Browser via Pyodide (WASM) — statisch auf Pages hostbar.
      Hinweis: Eine produktive Python-App (Streamlit/Flask) läuft auf einem Server
      (plugin.json dann "hosting": "server"). Pyodide dient hier nur der Pages-Kompatibilität.
      Datenklassifizierung (R_86): C0 — nur synthetische Daten.
    -->
    <style>
        :root { --accent: #F7C948; --bg: #f5f7fa; --card: #fff; --text: #1a1a1a; --muted: #6b6b6b; --ink: #8a6d00; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg);
               color: var(--text); display: flex; align-items: center; justify-content: center;
               min-height: 100vh; padding: 1.5rem; }
        .card { background: var(--card); border-top: 4px solid var(--accent); border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,.08); width: 100%; max-width: 420px; padding: 1.75rem; }
        h1 { margin: 0 0 .25rem; font-size: 1.3rem; color: var(--ink); }
        .sub { color: var(--muted); font-size: .85rem; margin-bottom: 1.25rem; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: .6rem 0;
               border-bottom: 1px solid #eee; }
        .row:last-of-type { border-bottom: none; }
        .label { color: var(--muted); font-size: .9rem; }
        .metric { font-size: 2rem; font-weight: 800; color: var(--ink); }
        button { margin-top: 1.25rem; width: 100%; background: var(--accent); color: var(--ink);
                 border: none; border-radius: 6px; padding: .7rem 1rem; font-size: .95rem;
                 font-weight: 700; cursor: pointer; }
        button:disabled { opacity: .6; cursor: default; }
        .tag { display: inline-block; font-size: .65rem; font-weight: 700; background: var(--accent);
               color: var(--ink); border-radius: 3px; padding: .15rem .4rem; margin-left: .5rem; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Projekt Übersicht <span class="tag">PY</span></h1>
        <div class="sub">Demo-Plugin — Python im Browser (Pyodide)</div>
        <div class="row"><span class="label">Projekt</span><span id="project">…</span></div>
        <div class="row"><span class="label">Status</span><span id="status">lädt Python…</span></div>
        <div class="row"><span class="label">Fortschritt</span><span class="metric" id="metric">—</span></div>
        <button id="refresh" disabled>Python wird geladen…</button>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
    <script>
        // Python-Logik (läuft via Pyodide im Browser) — nur synthetische Demo-Daten (C0)
        const PY = `
import json, random
projects = ["B-Tunnel Nord", "Brückenfeld Süd", "Halle 7 Ausbau", "Trasse West"]
states = ["In Planung", "In Ausführung", "Abnahme", "Abgeschlossen"]
def uebersicht():
    return json.dumps({
        "project": random.choice(projects),
        "status": random.choice(states),
        "progress": random.randint(0, 100),
    })
`;
        let pyodide;
        async function boot() {
            pyodide = await loadPyodide();
            await pyodide.runPythonAsync(PY);
            const btn = document.getElementById("refresh");
            btn.disabled = false;
            btn.textContent = "Aktualisieren";
            btn.addEventListener("click", render);
            render();
        }
        function render() {
            const data = JSON.parse(pyodide.runPython("uebersicht()"));
            document.getElementById("project").textContent = data.project;
            document.getElementById("status").textContent = data.status;
            document.getElementById("metric").textContent = data.progress + "%";
        }
        boot().catch(e => { document.getElementById("status").textContent = "Fehler: " + e; });
    </script>
</body>
</html>
